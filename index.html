<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>泳ぐ魚のAR Webアプリ (画像版)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, minimum-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="style.css">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/@c-frame/aframe-extras@7.3.0/dist/aframe-extras.min.js"></script>
</head>
<body>
    <a-scene xr-mode-ui="enabled: false"
             ar-modes="webxr-ar"
             renderer="antialias: true; alpha: true;">

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

        <a-assets>
            <img id="fish-image" src="./assets/fish_image.png">
        </a-assets>

        <div id="ar-button-container">
            <button id="ar-start-button">ARを開始</button>
        </div>
    </a-scene>

    <script src="script.js"></script>
</body>
</html>
